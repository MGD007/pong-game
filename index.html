<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pong by atomicat</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      background: #000;
      border: 2px solid white;
    }

    .score {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  letter-spacing: 2px;
}

.controls {
  position: absolute;
  top: 55px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: white;
  font-size: 14px;
  line-height: 1.6;
}
  </style>
</head>
<body>

<div class="score" id="score">0 : 0</div>
<div class="score" id="score">0 : 0</div>
<div class="controls">
  W → move up<br>
  S → move down
</div>  
<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

// Paddles
const paddleWidth = 10, paddleHeight = 100;

let leftPaddle = {
  x: 10,
  y: canvas.height / 2 - paddleHeight / 2,
  speed: 7
};

let rightPaddle = {
  x: canvas.width - 20,
  y: canvas.height / 2 - paddleHeight / 2,
  speed: 5
};

// Ball
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 8,
  speedX: 5,
  speedY: 3
};

// Score
let scoreLeft = 0;
let scoreRight = 0;

// Controls
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Reset ball after score
function resetBall(direction) {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  ball.speedX = 5 * direction;
  ball.speedY = (Math.random() * 6 - 3);
}

// Move paddles
function movePaddles() {
  // Player (W/S)
  if (keys["w"] && leftPaddle.y > 0) {
    leftPaddle.y -= leftPaddle.speed;
  }
  if (keys["s"] && leftPaddle.y < canvas.height - paddleHeight) {
    leftPaddle.y += leftPaddle.speed;
  }

  // AI
  let target = ball.y - paddleHeight / 2;
  rightPaddle.y += (target - rightPaddle.y) * 0.08;
}

// Ball physics
function moveBall() {
  ball.x += ball.speedX;
  ball.y += ball.speedY;

  // Top/bottom collision
  if (ball.y <= 0 || ball.y >= canvas.height) {
    ball.speedY *= -1;
  }

  // Left paddle collision
  if (
    ball.x <= leftPaddle.x + paddleWidth &&
    ball.y >= leftPaddle.y &&
    ball.y <= leftPaddle.y + paddleHeight
  ) {
    ball.speedX *= -1;
  }

  // Right paddle collision
  if (
    ball.x >= rightPaddle.x &&
    ball.y >= rightPaddle.y &&
    ball.y <= rightPaddle.y + paddleHeight
  ) {
    ball.speedX *= -1;
  }

  // SCORE RIGHT (AI gets point)
  if (ball.x < 0) {
    scoreRight++;
    updateScore();
    resetBall(1);
  }

  // SCORE LEFT (player gets point)
  if (ball.x > canvas.width) {
    scoreLeft++;
    updateScore();
    resetBall(-1);
  }
}

// Update score display
function updateScore() {
  scoreDisplay.textContent = `${scoreLeft} : ${scoreRight}`;
}

// Draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Center dashed line
  ctx.fillStyle = "#333";
  for (let i = 0; i < canvas.height; i += 20) {
    ctx.fillRect(canvas.width / 2 - 1, i, 2, 10);
  }

  // Paddles
  ctx.fillStyle = "#fff";
  ctx.fillRect(leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
  ctx.fillRect(rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
}

// Game loop
function update() {
  movePaddles();
  moveBall();
  draw();
  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
